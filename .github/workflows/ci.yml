name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.11.0"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build web bundle
        run: bun run build:web

      - name: Verify CLI entrypoint
        run: node --no-warnings --experimental-strip-types codex-sessions.ts --help

      - name: Verify npm package contents
        run: npm pack --dry-run

  build-desktop-windows:
    needs: validate-package
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22.11.0"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build web bundle
        run: bun run build:web

      - name: Build stable Windows desktop bundle
        run: bunx electrobun build --env=stable

      - name: Show packaged desktop artifacts
        shell: pwsh
        run: Get-ChildItem artifacts
